<style>
.gallery-img{
width:100%;
height:300px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
}
.gallery-img:hover{
transform:scale(1.05);
transition:.3s;
}
.hero{
position:relative;
height:70vh;
overflow:hidden;
}
.hero img{
width:100%;
height:100%;
object-fit:cover;
}
.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
background:rgba(0,0,0,.45);
padding:25px;
border-radius:6px;
text-align:center;
}
.banner{
position:relative;
height:40vh;
margin:50px 0;
overflow:hidden;
border-radius:6px;
}
.banner img{
width:100%;
height:100%;
object-fit:cover;
opacity:0.8;
}
.banner-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:2rem;
text-align:center;
background:rgba(0,0,0,0.45);
padding:15px;
border-radius:6px;
}
.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
backdrop-filter:blur(6px);
justify-content:center;
align-items:center;
z-index:9999;
}
.lightbox img{
max-width:90%;
max-height:90%;
}
.arrow{
position:absolute;
top:50%;
font-size:3rem;
color:white;
cursor:pointer;
user-select:none;
padding:10px;
}
.arrow.left{left:15px;}
.arrow.right{right:15px;}
</style>


<script>
let galleryImages=[]
let currentIndex=0
function openLightbox(el){
galleryImages=[...document.querySelectorAll('.gallery-img')]
currentIndex=galleryImages.indexOf(el)
updateLightbox()
document.getElementById('lightbox').style.display='flex'
}
function closeLightbox(){
document.getElementById('lightbox').style.display='none'
}
function updateLightbox(){
const img=document.getElementById('lightbox-img')
img.src=galleryImages[currentIndex].src
}
function prevImage(e){
e.stopPropagation()
currentIndex=(currentIndex-1+galleryImages.length)%galleryImages.length
updateLightbox()
}
function nextImage(e){
e.stopPropagation()
currentIndex=(currentIndex+1)%galleryImages.length
updateLightbox()
}
</script>

</head>
