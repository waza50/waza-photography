
<!DOCTYPE html>

<head>

<title>Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2/dist/shoelace.js"></script>


<style>
/* Featured images only */
.featured-img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 10px;
}

/* Other images */
.gallery-img{
  width:100%;
  height:auto;
  object-fit:contain;
  border-radius:6px;
  margin-bottom:10px;
}

/* Hero and Banner */
.hero{
position:relative;
height:70vh;
overflow:hidden;
}
.hero img{
width:100%;
height:100%;
object-fit:cover;
}
.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
background:rgba(0,0,0,.45);
padding:25px;
border-radius:6px;
text-align:center;
}
.banner{
position:relative;
height:40vh;
margin:50px 0;
overflow:hidden;
border-radius:6px;
}
.banner img{
width:100%;
height:100%;
object-fit:cover;
opacity:0.8;
}
.banner-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:2rem;
text-align:center;
background:rgba(0,0,0,0.45);
padding:15px;
border-radius:6px;
}
</style>

</head>
